name: Test

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      # Unit + UI-server tests are hermetic (no PalGate network access).
      # The e2e suite (test:e2e) needs a live Homebridge + Chrome and runs locally only.
      - run: npm test
